name: CricVeda Daily Scrape

on:
  schedule:
    - cron: "0 3 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd cricveda && npm install
      - run: cd cricveda && npx ts-node src/scripts/scrape-fixtures.ts

