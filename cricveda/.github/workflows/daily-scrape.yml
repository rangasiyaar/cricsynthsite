name: CricVeda Daily Scrape

on:
  schedule:
    # Run daily at 03:00 UTC (before most T20 leagues start)
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-fixtures:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cricveda/package-lock.json
      - run: npm ci
        working-directory: cricveda
      - name: Scrape upcoming fixtures
        run: npx tsx src/scripts/scrape-fixtures.ts
        working-directory: cricveda
      - name: Scrape squad updates
        run: npx tsx src/scripts/scrape-squads.ts
        working-directory: cricveda

  precompute:
    needs: scrape-fixtures
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cricveda/package-lock.json
      - run: npm ci
        working-directory: cricveda
      - name: Precompute insights for upcoming fixtures
        run: npx tsx src/scripts/precompute-insights.ts
        working-directory: cricveda

