name: CricVeda Precompute Insights

on:
  workflow_dispatch:

jobs:
  precompute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd cricveda && npm install
      - run: cd cricveda && npx ts-node src/scripts/precompute-insights.ts

