# CricketMind AI — GitHub Actions Daily Prediction Workflow
# Runs daily at 05:00 UTC to generate predictions for upcoming matches

name: Daily Cricket Predictions

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 5:00 AM UTC (10:30 AM IST)
  workflow_dispatch:  # Manual trigger

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./cricketmind-ai
        run: |
          pip install -r requirements.txt

      - name: Run auto-prediction
        working-directory: ./cricketmind-ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRICDATA_API_KEY: ${{ secrets.CRICDATA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -m orchestrator.auto_predict 48

      - name: Upload predictions as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_id }}
          path: cricketmind-ai/output/predictions/
          retention-days: 30

      - name: Commit predictions to repo
        run: |
          git config user.name "CricketMind Bot"
          git config user.email "bot@cricsynthesis.com"
          git add cricketmind-ai/output/predictions/ || true
          git diff --cached --quiet || git commit -m "🏏 Auto-prediction $(date +%Y-%m-%d)"
          git push || echo "No changes to push"
