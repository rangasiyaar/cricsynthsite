<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — CricSynthesis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">

  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-card {
      width: 100%; max-width: 400px;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-2xl);
      padding: 2.5rem;
    }
    .login-logo {
      display: flex; justify-content: center;
      margin-bottom: 1.75rem; text-decoration: none;
    }
    .login-logo img { height: 56px; width: auto; object-fit: contain; }
    h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--color-text-primary); margin-bottom: 0.375rem; }
    .login-sub { font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 1.75rem; line-height: 1.5; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      width: 100%; padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      font-size: 0.9rem; font-weight: 600; color: var(--color-text-primary);
      cursor: pointer; transition: background var(--transition-fast), border-color var(--transition-fast);
    }
    .google-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }
    .google-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--color-accent-secondary);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { height: 1px; background: var(--color-border); margin: 1.5rem 0; }
    .login-footer { font-size: 0.75rem; color: var(--color-text-muted); text-align: center; line-height: 1.6; }
    .login-footer a { color: var(--color-accent-secondary); text-decoration: none; }
    .error-box {
      padding: 0.75rem 1rem; border-radius: var(--radius-md); margin-bottom: 1.25rem;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      font-size: 0.8rem; color: #fca5a5; display: none;
    }
  </style>
</head>
<body data-no-layout>
<div class="noise-overlay" aria-hidden="true"></div>

<div class="login-card">
  <a href="index.html" class="login-logo">
    <img src="assets/logo New.png" alt="CricSynthesis">
  </a>

  <h1>Sign in</h1>
  <p class="login-sub">Access your dashboard to manage API keys, view usage, and explore cricket intelligence tools.</p>

  <div class="error-box" id="errorBox"></div>

  <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"></div>

  <p class="login-footer">
    By signing in you agree to our
    <a href="terms.html">Terms of Service</a> and
    <a href="privacy.html">Privacy Policy</a>.<br><br>
    Don't have access? <a href="contact.html">Contact Sales →</a>
  </p>
</div>

<!-- Supabase JS SDK (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // Replace with your Supabase project values
  const SUPABASE_URL = 'https://your-project.supabase.co';
  const SUPABASE_ANON_KEY = 'your-anon-key';

  // Where to redirect after login (your deployed Next.js app)
  const DASHBOARD_URL = 'https://app.cricsynthesis.in/auth/callback';

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Show error from redirect if any
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    const box = document.getElementById('errorBox');
    box.style.display = 'block';
    box.textContent = 'Authentication failed. Please try again.';
  }

  async function signInWithGoogle() {
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Redirecting…';

    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: DASHBOARD_URL }
    });

    if (error) {
      const box = document.getElementById('errorBox');
      box.style.display = 'block';
      box.textContent = error.message;
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google`;
    }
  }
</script>
<script src="js/layout.js"></script>
</body>
</html>
